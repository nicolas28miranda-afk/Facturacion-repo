server {
    listen 8080;
    client_max_body_size 10M;

    location = / {
        return 302 /facturacion-backend/;
    }

    # Si el HTML pide /assets/... sin el prefijo del context-path
    location /assets/ {
        proxy_pass http://facturacion:8080/facturacion-backend/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /images/ {
        proxy_pass http://facturacion:8080/facturacion-backend/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /facturacion-backend/ {
        proxy_pass http://facturacion:8080/facturacion-backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /cib-ms-cdp/ {
        proxy_pass http://cdp:8080/cib-ms-cdp/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
